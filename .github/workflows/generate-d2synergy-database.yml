name: Generate D2Synergy Database

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/generate-d2synergy-database.yml"

jobs:
  generate-database:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Compendium
        run: node scripts/download-compendium.mjs

      - name: Download Bungie Manifest
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: node scripts/download-manifest.mjs

      - name: Build D2Synergy Database
        run: node scripts/build-d2synergy-database.mjs

      - name: Upload D2Synergy data
        uses: actions/upload-artifact@v4
        with:
          name: d2synergy-database-build
          path: |
            temp/
            generated/
          if-no-files-found: error
