<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D2Synergy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/base.css?v=20260715-claude-redesign-1">
<link rel="stylesheet" href="css/inventory.css?v=20260715-claude-redesign-1">
<link rel="stylesheet" href="css/activities-vendors.css?v=20260715-claude-redesign-1">
<link rel="stylesheet" href="css/layout.css?v=20260715-claude-redesign-1">
<link rel="stylesheet" href="css/readout.css?v=20260715-claude-redesign-1">
</head>
<body>

<header class="top">
  <div>
    <h1>D2Synergy</h1>
    <div class="tag">for build/theory crafting and damage %'s</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:8px; align-items:stretch;">
    <button class="reset" id="syncDrawerBtn" title="Bungie Account Sync">&#9776;</button>
    <button class="reset" id="resetBtn">Reset Build</button>
    <button class="reset" id="globalSyncBtn" title="Sync everything from your real account at once">Sync My Live Build</button>
  </div>
</header>

<div class="drawerOverlay" id="drawerOverlay"></div>
<div class="drawer" id="syncDrawer">
  <div class="drawerScrollBody">
    <div class="drawerHead" style="justify-content:flex-end;">
      <button class="drawerClose" id="drawerCloseBtn">&times;</button>
    </div>
    <div id="syncCol"></div>
  </div>
  <div class="drawerFooter" id="syncDrawerFooter"></div>
</div>

<!-- Phase 2: Full-Screen Vault View overlay (populated by JS) -->
<div class="fsOverlay" id="vaultFsOverlay" data-testid="vault-fullscreen-overlay">
  <div class="fsHead">
    <div>
      <h2>Vault &amp; Characters</h2>
      <div class="sub">Full-screen inventory</div>
    </div>
    <input class="fsSearch" id="fsSearchInput" type="text" placeholder="Search items..." data-testid="vault-search-input" />
    <div class="fsChips" id="fsElemChips" data-testid="vault-element-filters"></div>
    <div class="fsChips" id="fsTypeChips" data-testid="vault-type-filters"></div>
    <button class="fsReload" id="fsReloadBtn" data-testid="vault-reload-btn">Reload</button>
    <button class="fsClose" id="fsCloseBtn" title="Close" data-testid="vault-close-btn">&times;</button>
  </div>
  <div class="fsBody" id="fsBody" data-testid="vault-body"></div>
</div>

<!-- Phase 3: Vendor Inventories window -->
<div class="fsOverlay" id="vendorsOverlay" data-testid="vendors-overlay">
  <div class="fsHead">
    <div>
      <h2>Vendor Inventories</h2>
      <div class="sub" id="vendorsReset">Live vendor sales</div>
    </div>
    <input class="fsSearch" id="vendorsSearch" type="text" placeholder="Search items..." data-testid="vendors-search-input" />
    <button class="fsReload" id="vendorsReloadBtn" data-testid="vendors-reload-btn">Reload</button>
    <button class="fsClose" id="vendorsCloseBtn" title="Close" data-testid="vendors-close-btn">&times;</button>
  </div>
  <div class="fsBody fsBodyCol" id="vendorsBody" data-testid="vendors-body"></div>
</div>

<!-- Phase 3: Daily & Weekly Activities window -->
<div class="fsOverlay" id="activitiesOverlay" data-testid="activities-overlay">
  <div class="fsHead">
    <div>
      <h2>Daily &amp; Weekly Activities</h2>
      <div class="sub" id="activitiesReset">Milestones &amp; rewards</div>
    </div>
    <button class="fsReload" id="activitiesReloadBtn" data-testid="activities-reload-btn">Reload</button>
    <button class="fsClose" id="activitiesCloseBtn" title="Close" data-testid="activities-close-btn">&times;</button>
  </div>
  <div class="fsBody fsBodyCol" id="activitiesBody" data-testid="activities-body"></div>
</div>

<!-- Phase 3: DIM-style item detail modal (populated by JS) -->
<div class="idOverlay" id="itemDetailOverlay" data-testid="item-detail-overlay">
  <div class="idCard" id="itemDetailCard"></div>
</div>

<div class="charBar" id="charBar" data-testid="character-bar"></div>

<div class="layout">
  <div class="accordionHead" id="readoutToggle">
    <h2>Build Synergy Readout</h2>
    <span class="hint" id="readoutHint"></span>
    <span class="chev open" id="readoutChev">&#9656;</span>
  </div>
  <div class="col readout" id="readoutCol"></div>

  <div class="accordionHead" id="statsToggle">
    <h2>Character Stats</h2>
    <span class="hint" id="statsHint"></span>
    <span class="chev" id="statsChev">&#9656;</span>
  </div>
  <div class="col readout collapsed" id="statsCol"></div>

  <div class="col builder" id="builderCol"></div>
</div>

<script src="js/data/subclasses.js?v=20260715-claude-redesign-1"></script>
<script src="js/data/abilities.js?v=20260715-claude-redesign-1"></script>
<script src="js/data/exotics.js?v=20260715-claude-redesign-1"></script>
<script src="js/data/weapons.js?v=20260715-claude-redesign-1"></script>
<script src="js/data/armor.js?v=20260715-claude-redesign-1"></script>
<script src="js/data/artifacts.js?v=20260715-claude-redesign-1"></script>
<script src="js/core/state.js?v=20260715-claude-redesign-1"></script>
<script src="js/core/synergy-engine.js?v=20260715-claude-redesign-1"></script>
<script src="js/ui/builder.js?v=20260715-claude-redesign-1"></script>
<script src="js/ui/readout.js?v=20260715-claude-redesign-1"></script>
<script src="js/api/bungie.js?v=20260715-claude-redesign-1"></script>
<script src="js/features/vault.js?v=20260715-claude-redesign-1"></script>
<script src="js/features/activities-vendors.js?v=20260715-claude-redesign-1"></script>
<script src="js/features/live-character-sync.js?v=20260715-claude-redesign-1"></script>
<script src="js/features/item-detail.js?v=20260715-claude-redesign-1"></script>
<script src="js/features/finalize-loadout.js?v=20260715-claude-redesign-1"></script>

</body>
</html>
